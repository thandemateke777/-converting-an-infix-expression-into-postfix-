<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infix to Postfix/Prefix – Flowchart</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 30px; }
  h1 { font-size: 20px; margin-bottom: 6px; }
  p  { font-size: 13px; color: #555; margin: 0 0 20px; }
  svg text { font-family: Arial, sans-serif; }
</style>
</head>
<body>
<h1>Infix → Postfix &amp; Prefix Conversion Flowchart</h1>
<p>Algorithm using a Stack-based approach</p>

<svg width="700" viewBox="0 0 700 960" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- START -->
  <ellipse cx="350" cy="40" rx="80" ry="28" fill="#1d9e75" stroke="#0f6e56" stroke-width="1.5"/>
  <text x="350" y="44" text-anchor="middle" fill="white" font-size="15" font-weight="bold">START</text>
  <line x1="350" y1="68" x2="350" y2="100" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Read Infix -->
  <rect x="185" y="100" width="330" height="50" rx="8" fill="#b5d4f4" stroke="#185fa5" stroke-width="1.2"/>
  <text x="350" y="121" text-anchor="middle" fill="#042c53" font-size="13" font-weight="bold">Read infix expression</text>
  <text x="350" y="140" text-anchor="middle" fill="#0c447c" font-size="11">Initialize empty Stack and output string</text>
  <line x1="350" y1="150" x2="350" y2="182" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Prefix: reverse -->
  <rect x="165" y="182" width="370" height="50" rx="8" fill="#cecbf6" stroke="#534ab7" stroke-width="1.2"/>
  <text x="350" y="203" text-anchor="middle" fill="#26215c" font-size="13" font-weight="bold">For Prefix: Reverse expression</text>
  <text x="350" y="222" text-anchor="middle" fill="#3c3489" font-size="11">Swap '(' ↔ ')' then apply postfix algorithm</text>
  <line x1="350" y1="232" x2="350" y2="264" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- More tokens? -->
  <polygon points="350,264 490,304 350,344 210,304" fill="#faeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="350" y="300" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">More tokens</text>
  <text x="350" y="318" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">to scan?</text>

  <!-- YES -->
  <line x1="350" y1="344" x2="350" y2="376" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="363" fill="#444" font-size="11">Yes</text>

  <!-- Read next token -->
  <rect x="205" y="376" width="290" height="44" rx="8" fill="#b5d4f4" stroke="#185fa5" stroke-width="1.2"/>
  <text x="350" y="403" text-anchor="middle" fill="#042c53" font-size="13" font-weight="bold">Read next token</text>
  <line x1="350" y1="420" x2="350" y2="452" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Is operand? -->
  <polygon points="350,452 490,492 350,532 210,492" fill="#faeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="350" y="488" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">Is token an</text>
  <text x="350" y="506" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">operand?</text>

  <!-- Yes → add to output -->
  <line x1="490" y1="492" x2="570" y2="492" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="499" y="484" fill="#444" font-size="11">Yes</text>
  <rect x="570" y="470" width="110" height="44" rx="8" fill="#c0dd97" stroke="#3b6d11" stroke-width="1.2"/>
  <text x="625" y="493" text-anchor="middle" fill="#173404" font-size="12" font-weight="bold">Append to</text>
  <text x="625" y="508" text-anchor="middle" fill="#173404" font-size="12" font-weight="bold">output</text>
  <path d="M625 514 Q625 550 490 550 L350 550" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- No → Is '('? -->
  <line x1="350" y1="532" x2="350" y2="564" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="551" fill="#444" font-size="11">No</text>
  <polygon points="350,564 490,600 350,636 210,600" fill="#faeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="350" y="596" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">Is token</text>
  <text x="350" y="614" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">'(' ?</text>

  <!-- Yes → push -->
  <line x1="490" y1="600" x2="570" y2="600" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="499" y="592" fill="#444" font-size="11">Yes</text>
  <rect x="570" y="578" width="110" height="44" rx="8" fill="#f5c4b3" stroke="#993c1d" stroke-width="1.2"/>
  <text x="625" y="601" text-anchor="middle" fill="#4a1b0c" font-size="12" font-weight="bold">Push '(' to</text>
  <text x="625" y="616" text-anchor="middle" fill="#4a1b0c" font-size="12" font-weight="bold">stack</text>
  <path d="M625 622 L625 660 L490 660" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- No → Is ')'? -->
  <line x1="350" y1="636" x2="350" y2="668" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="655" fill="#444" font-size="11">No</text>
  <polygon points="350,668 490,704 350,740 210,704" fill="#faeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="350" y="700" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">Is token</text>
  <text x="350" y="718" text-anchor="middle" fill="#412402" font-size="13" font-weight="bold">')'?</text>

  <!-- Yes → pop until '(' -->
  <line x1="210" y1="704" x2="130" y2="704" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="140" y="696" fill="#444" font-size="11">Yes</text>
  <rect x="20" y="682" width="110" height="44" rx="8" fill="#f5c4b3" stroke="#993c1d" stroke-width="1.2"/>
  <text x="75" y="701" text-anchor="middle" fill="#4a1b0c" font-size="12" font-weight="bold">Pop until</text>
  <text x="75" y="716" text-anchor="middle" fill="#4a1b0c" font-size="12" font-weight="bold">'(' found</text>
  <path d="M75 726 L75 780 L280 780" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- No → operator -->
  <line x1="350" y1="740" x2="350" y2="772" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="759" fill="#444" font-size="11">No (operator)</text>
  <rect x="165" y="772" width="370" height="50" rx="8" fill="#b5d4f4" stroke="#185fa5" stroke-width="1.2"/>
  <text x="350" y="793" text-anchor="middle" fill="#042c53" font-size="13" font-weight="bold">Pop higher/equal precedence ops</text>
  <text x="350" y="812" text-anchor="middle" fill="#0c447c" font-size="11">Add to output, then push current op</text>

  <!-- Loop back left -->
  <path d="M165 797 L110 797 L110 304 L210 304" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="85" y="560" fill="#888" font-size="10" text-anchor="middle" transform="rotate(-90 85 560)">Loop back</text>

  <!-- No more tokens → pop all -->
  <line x1="490" y1="304" x2="570" y2="304" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="497" y="296" fill="#444" font-size="11">No</text>
  <rect x="570" y="282" width="110" height="44" rx="8" fill="#b5d4f4" stroke="#185fa5" stroke-width="1.2"/>
  <text x="625" y="301" text-anchor="middle" fill="#042c53" font-size="12" font-weight="bold">Pop all</text>
  <text x="625" y="316" text-anchor="middle" fill="#0c447c" font-size="11">remaining</text>
  <path d="M625 326 L625 860 L450 860" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="180" y="838" width="270" height="50" rx="8" fill="#c0dd97" stroke="#3b6d11" stroke-width="1.2"/>
  <text x="315" y="859" text-anchor="middle" fill="#173404" font-size="13" font-weight="bold">Output = Postfix result</text>
  <text x="315" y="878" text-anchor="middle" fill="#27500a" font-size="11">Reverse output → Prefix result</text>

  <!-- END -->
  <line x1="315" y1="888" x2="315" y2="918" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <ellipse cx="315" cy="942" rx="80" ry="28" fill="#1d9e75" stroke="#0f6e56" stroke-width="1.5"/>
  <text x="315" y="946" text-anchor="middle" fill="white" font-size="15" font-weight="bold">END</text>
</svg>

<p style="margin-top:20px; font-size:12px; color:#888;">Infix Expression Converter – Assignment Flowchart</p>
</body>
</html>
